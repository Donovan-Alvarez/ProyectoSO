<div class="registro-wrapper">
  <mat-card class="registro-card">
    <mat-card-header>
      <mat-card-title>Crear Cuenta</mat-card-title>
      <mat-card-subtitle>Únete a Tienda Grupo 2</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="registroForm" (ngSubmit)="onSubmit()" class="registro-form">
        
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nombre completo</mat-label>
          <input matInput formControlName="nombre" placeholder="Ej. Donovan Pérez">
          <mat-icon matSuffix>badge</mat-icon>
          <mat-error *ngIf="registroForm.get('nombre')?.hasError('required')">
            El nombre es obligatorio
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Correo electrónico</mat-label>
          <input matInput type="email" formControlName="email" placeholder="correo@ejemplo.com">
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="registroForm.get('email')?.hasError('email')">
            Ingresa un correo válido
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput [type]="hide ? 'password' : 'text'" formControlName="password">
          <button mat-icon-button matSuffix (click)="hide = !hide" type="button">
            <mat-icon>{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="registroForm.get('password')?.hasError('minlength')">
            Mínimo 6 caracteres
          </mat-error>
        </mat-form-field>

        <button mat-raised-button color="accent" class="full-width registro-btn" [disabled]="registroForm.invalid">
          REGISTRARSE
        </button>

        <div class="footer-link">
          ¿Ya tienes cuenta? <a routerLink="/">Inicia sesión</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
